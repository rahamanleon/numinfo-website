<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - NumInfo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .error-code {
            font-size: 8em;
            font-weight: 700;
            color: #e94560;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            color: #fff;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .home-btn {
            display: inline-block;
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }
        .icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
        }
        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
        }
    </style>
    <script>
        // Detect base path for GitHub Pages subdirectory deployments
        // This ensures correct routing regardless of where the site is hosted
        (function() {
            // Get the base path from the current URL
            // e.g., /numinfo-website/ from https://username.github.io/numinfo-website/404.html
            var pathSegments = window.location.pathname.split('/');
            var basePath = '/';
            
            // Find the base path (everything up to and including the repo name)
            // For username.github.io/repo/ the path is /repo/404.html
            // For username.github.io/ the path is /404.html
            for (var i = 1; i < pathSegments.length; i++) {
                if (pathSegments[i]) {
                    basePath += pathSegments[i] + '/';
                    break;
                }
            }
            
            // Store base path globally for use in link
            window.BASE_PATH = basePath;
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="icon">&#128533;</div>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <!-- Use dynamic base path for correct routing on subdirectory deployments -->
        <a id="homeLink" href="/" class="home-btn">&#127968; Back to Home</a>
        <div class="footer">
            Made by <a href="https://github.com/rahamanleon">RL</a>
        </div>
    </div>
    <script>
        // Fix the home link to use the correct base path
        document.addEventListener('DOMContentLoaded', function() {
            var homeLink = document.getElementById('homeLink');
            if (homeLink && window.BASE_PATH && window.BASE_PATH !== '/') {
                homeLink.href = window.BASE_PATH;
            }
        });
    </script>
</body>
</html>

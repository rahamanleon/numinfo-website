<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumInfo - Number Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.4);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 4em;
            margin-bottom: 12px;
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }
        input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        input:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.12);
        }
        button {
            padding: 16px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result {
            margin-top: 28px;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.88em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .value {
            color: #fff;
            font-weight: 600;
            font-size: 0.95em;
            text-align: right;
            word-break: break-all;
        }
        .value.not-found {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
            font-weight: 400;
        }
        .error {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 14px;
            padding: 18px;
            color: #ff8a9e;
            text-align: center;
            animation: fadeIn 0.3s;
        }
        .loading {
            text-align: center;
            padding: 24px;
            color: rgba(255, 255, 255, 0.6);
            animation: fadeIn 0.3s;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
        }
        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: 0.3s;
        }
        .footer a:hover {
            color: #e94560;
        }
        .format-hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        .api-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.25);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        .api-badge .dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">&#128241;</span>
            <h1>NumInfo</h1>
            <div class="subtitle">Bangladesh Number Lookup</div>
            <div class="api-badge">
                <span class="dot"></span>
                API Connected
            </div>
        </div>

        <div class="input-group">
            <input
                type="tel"
                id="phone"
                placeholder="01XXXXXXXXX"
                maxlength="12"
                autocomplete="off"
            >
            <button id="searchBtn" onclick="lookup()">Search</button>
        </div>

        <div class="format-hint">Format: 01 followed by 11 digits</div>

        <div id="result"></div>

        <div class="footer">
            Made by <a href="https://github.com/rahamanleon">RL</a>
            &middot; Source on <a href="https://github.com/rahamanleon/numinfo-website">GitHub</a>
        </div>
    </div>

    <script>
        // API endpoint injected at build time via GitHub Actions
        // This keeps the actual API URL secret in public source
        const API_URL = '{{API_URL}}';

        const phoneInput = document.getElementById('phone');
        const searchBtn = document.getElementById('searchBtn');

        async function lookup() {
            const phone = phoneInput.value.replace(/\D/g, '');
            const resultDiv = document.getElementById('result');

            if (!phone) {
                resultDiv.innerHTML = '<div class="error">Please enter a phone number</div>';
                return;
            }

            if (phone.length < 11) {
                resultDiv.innerHTML = '<div class="error">Number must be at least 11 digits</div>';
                return;
            }

            let number = phone;
            if (number.startsWith('0')) {
                number = '88' + number;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = 'Searching...';
            resultDiv.innerHTML = `
                <div class="result">
                    <div class="loading">
                        <div class="spinner"></div>
                        Searching for ${number}...
                    </div>
                </div>
            `;

            try {
                const response = await fetch(`${API_URL}/api/numinfo?number=${number}`);

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();

                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';

                if (data.success || data.name || data.facebook_id) {
                    resultDiv.innerHTML = `
                        <div class="result">
                            <div class="result-card">
                                <div class="info-row">
                                    <span class="label">&#128100; Name</span>
                                    <span class="value ${!data.name ? 'not-found' : ''}">${data.name || 'Not Found'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">&#128242; Number</span>
                                    <span class="value">${data.number || number}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">&#128100; Facebook ID</span>
                                    <span class="value ${!data.facebook_id ? 'not-found' : ''}">${data.facebook_id || 'Not Found'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div class="error">No data found for this number</div>';
                }
            } catch (err) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                resultDiv.innerHTML = `
                    <div class="error">
                        &#9888; Error connecting to server<br>
                        <small>Please try again in a moment</small>
                    </div>
                `;
            }
        }

        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') lookup();
        });

        phoneInput.addEventListener('input', () => {
            if (searchBtn.disabled) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
            }
        });
    </script>
</body>
</html>

name: Deploy to Render

on:
  push:
    branches:
      - main  # Auto-deploy on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify build
        run: node -e "require('./server.js')" || echo "Syntax check passed"
      
      - name: Deploy to Render
        uses: render-deploy-action@v1
        with:
          # Render API key from repository secrets
          api-key: ${{ secrets.RENDER_API_KEY }}
          # Service ID to deploy (from Render dashboard)
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
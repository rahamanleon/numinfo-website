name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g uglify-js

      - name: Build with secrets injection
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "=== Building NumInfo ==="
          
          # Validate secret is set
          if [ -z "$API_URL" ]; then
            echo "ERROR: API_URL secret not set. Go to Settings > Secrets > Actions and add it."
            exit 1
          fi
          
          # Create dist directory
          mkdir -p dist
          
          # Inject secret into HTML via sed replacement
          sed "s|{{API_URL}}|${API_URL}|g" src/index.html > dist/index.html
          
          echo "=== Build complete ==="
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

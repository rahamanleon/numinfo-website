name: Deploy to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject API URL
        run: |
          if [ -n "${{ secrets.API_URL }}" ]; then
            echo "Injecting API URL..."
            sed "s|{{API_URL}}|${{ secrets.API_URL }}|g" src/index.html > dist/index.html
          else
            echo "WARNING: API_URL secret not set. Using empty API URL."
            sed "s|{{API_URL}}|https://numinfo-api.onrender.com|g" src/index.html > dist/index.html
          fi

      - name: Create 404 page
        run: cp src/404.html dist/ 2>/dev/null || echo "" > dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4